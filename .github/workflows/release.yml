name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Version tag to publish, for example v0.1.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows
            artifact: metaView-Windows
            archive: metaView-Windows.zip
          - os: macos-latest
            label: macOS
            artifact: metaView-macOS
            archive: metaView-macOS.zip
          - os: ubuntu-latest
            label: Linux
            artifact: metaView-Linux
            archive: metaView-Linux.tar.gz

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements-dev.txt

      - name: Build native application
        run: python scripts/build.py

      - name: Archive Windows build
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist/metaView -DestinationPath dist/metaView-Windows.zip

      - name: Archive macOS build
        if: runner.os == 'macOS'
        run: ditto -c -k --sequesterRsrc --keepParent dist/metaView.app dist/metaView-macOS.zip

      - name: Archive Linux build
        if: runner.os == 'Linux'
        run: tar -C dist -czf dist/metaView-Linux.tar.gz metaView

      - name: Upload build archive
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.archive }}
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Download all build archives
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$RELEASE_TAG" \
            release-assets/metaView-Windows.zip \
            release-assets/metaView-macOS.zip \
            release-assets/metaView-Linux.tar.gz \
            --verify-tag \
            --generate-notes \
            --title "metaView $RELEASE_TAG"
