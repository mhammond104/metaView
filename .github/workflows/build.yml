name: Build applications

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows
            artifact: metaView-Windows
          - os: macos-latest
            label: macOS
            artifact: metaView-macOS
          - os: ubuntu-latest
            label: Linux
            artifact: metaView-Linux

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements-dev.txt

      - name: Build native application
        run: python scripts/build.py

      - name: Archive Windows build
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist/metaView -DestinationPath dist/metaView-Windows.zip

      - name: Archive macOS build
        if: runner.os == 'macOS'
        run: ditto -c -k --sequesterRsrc --keepParent dist/metaView.app dist/metaView-macOS.zip

      - name: Archive Linux build
        if: runner.os == 'Linux'
        run: tar -C dist -czf dist/metaView-Linux.tar.gz metaView

      - name: Upload Windows artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/metaView-Windows.zip

      - name: Upload macOS artifact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/metaView-macOS.zip

      - name: Upload Linux artifact
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/metaView-Linux.tar.gz
